# ===================================================================
# === 最终高质量训练配置文件 ===
# ===================================================================

# --- 数据参数 (请确保与 create_dataset.py 中的设置一致) ---
IMG_SIZE: 32
DIGITS: [3, 7]

# --- 训练参数 ---
# 注意: train.py脚本会覆盖此处的MODEL_TYPE, 依次训练'baseline'和'scd'
# 因此, 此处的值仅为占位符, 无实际作用
MODEL_TYPE: 'placeholder' 

EPOCHS: 500         # 大幅增加训练轮次以提升图像质量
BATCH_SIZE: 64      # 配合增大的模型(BASE_CHANNELS=64), 适当减小批量以防内存溢出
LEARNING_RATE: 0.0001
DEVICE: 'mps'       # 保持使用Apple Silicon GPU

# --- 扩散模型参数 ---
TIMESTEPS: 1000     # 增加扩散步数以生成更精细的图像

# --- U-Net 架构参数 ---
BASE_CHANNELS: 64   # 增加模型基础通道数, 提升模型容量和细节学习能力
NUM_CLASSES: 2      # 对应 DIGITS [3, 7]
NUM_COLORS: 2       # 对应 红色/绿色